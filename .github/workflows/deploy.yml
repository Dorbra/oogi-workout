name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write   # push version tags
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required to read all tags

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Determine next version
        id: version
        run: |
          git fetch --tags
          LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            NEXT="v1.0.0"
          else
            IFS='.' read -r major minor patch <<< "${LATEST#v}"
            NEXT="v${major}.${minor}.$((patch + 1))"
          fi
          echo "tag=${NEXT}" >> $GITHUB_OUTPUT
          echo "plain=${NEXT#v}" >> $GITHUB_OUTPUT
          echo "Next version: ${NEXT}"

      - name: Build
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.plain }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Tag release
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}
