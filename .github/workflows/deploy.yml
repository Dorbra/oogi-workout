name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write      # push version tags
  deployments: write   # Cloudflare Pages deployment status on GitHub

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required to read all tags

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Determine next version
        id: version
        run: |
          git fetch --tags
          LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            NEXT="v1.0.0"
          else
            IFS='.' read -r major minor patch <<< "${LATEST#v}"
            NEXT="v${major}.${minor}.$((patch + 1))"
          fi
          echo "tag=${NEXT}" >> $GITHUB_OUTPUT
          echo "plain=${NEXT#v}" >> $GITHUB_OUTPUT
          echo "Next version: ${NEXT}"

      - name: Build
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.plain }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=oogi-workout

      - name: Tag release
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}
