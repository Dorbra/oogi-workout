version: 2

updates:
  # npm — one PR per week combining all patch + minor bumps.
  # Major version bumps are excluded from the group and get individual PRs.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    open-pull-requests-limit: 2
    commit-message:
      prefix: chore
      include: scope
    groups:
      all-non-major:
        update-types:
          - patch
          - minor

  # GitHub Actions — one PR per week for all action updates
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    open-pull-requests-limit: 2
    commit-message:
      prefix: chore
      include: scope
    groups:
      all-actions:
        update-types:
          - patch
          - minor
